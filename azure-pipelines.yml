# Azure Pipeline for AI Auto Repairman (Azure DevOps org: McpServer).
#
# Three stages:
#   1. Test        - backend unit tests (store + admin) on the self-hosted 'Default' pool.
#   2. PublishApp  - publish the PWA (docs/) to the GitHub Pages repo sharpninja/repairs.
#   (This org is self-hosted only; there is no Microsoft-hosted 'Azure Pipelines' pool, so every stage uses 'Default'.)
#   3. DeployService - create + deploy an Octopus release; Octopus runs on the PAYTON-DESKTOP
#                    Windows target and triggers the docker redeploy (git pull + docker compose up).
#
# All prerequisites are provisioned (2026-07-07):
#   - GITHUB_PAT   : secret pipeline variable (repo:contents write on sharpninja/repairs) for the Pages publish.
#   - DeployService runs on the self-hosted 'Default' pool (PAYTON-DESKTOP agents) which can reach the LAN
#     Octopus at http://payton-desktop:8065, has the octopus CLI, and reads OCTOPUS_URL / OCTOPUS_API_KEY /
#     OCTOPUS_SPACE from machine env vars (set on PAYTON-DESKTOP + PAYTON-LEGION2).
#   - Octopus is licensed; project 'AI Auto Repairman Service' has a 'Production' deployment process that
#     redeploys the docker service on the PAYTON-DESKTOP target.

trigger:
  branches:
    include: [ main ]

variables:
  octopusProject: 'AI Auto Repairman Service'
  octopusEnvironment: 'Production'
  octopusSpace: 'Default'

stages:
- stage: Test
  displayName: Test
  jobs:
  - job: Backend
    pool:
      name: 'Default'
    steps:
    - checkout: self
    # node is baked into the PAYTON-DESKTOP host (golden host), so no NodeTool download needed.
    - script: cd server && npm ci
      displayName: install server deps
    - script: node tests/store.test.mjs
      displayName: store unit tests
    - script: node tests/admin.test.mjs
      displayName: admin dashboard unit tests
    - script: node tests/direct-submit-auth.test.mjs
      displayName: direct submit auth unit tests

- stage: PublishApp
  displayName: Publish app to GitHub Pages
  dependsOn: Test
  condition: succeeded()
  jobs:
  - job: PublishPages
    pool:
      name: 'Default'
    steps:
    - checkout: self
    - powershell: |
        git config --global user.email "ci@thesharp.ninja"
        git config --global user.name "Azure Pipeline"
        if (Test-Path ghpages) { Remove-Item -Recurse -Force ghpages }
        git clone "https://$(GITHUB_PAT)@github.com/sharpninja/repairs.git" ghpages
        if ($LASTEXITCODE -ne 0) { throw "git clone failed" }
        Remove-Item -Recurse -Force ghpages\docs
        Copy-Item -Recurse docs ghpages\docs
        Set-Location ghpages
        git add docs
        git commit -m "publish app $(Build.BuildNumber) [skip ci]" 2>&1 | Write-Host
        git push origin HEAD:main
        if ($LASTEXITCODE -ne 0) { throw "git push failed" }
      displayName: Publish docs/ to sharpninja/repairs (GitHub Pages)

- stage: DeployService
  displayName: Deploy service to Octopus (PAYTON-DESKTOP)
  dependsOn: Test
  condition: succeeded()
  jobs:
  - job: DeployToOctopus
    pool:
      name: 'Default'   # self-hosted PAYTON-DESKTOP agents: reach the LAN Octopus, have OCTOPUS_* machine env + octopus CLI
    steps:
    - checkout: none
    - powershell: |
        $ver = "$(Build.BuildNumber)"
        $octopusUrl = $env:OCTOPUS_URL
        if ([string]::IsNullOrWhiteSpace($octopusUrl)) { $octopusUrl = "http://payton-desktop:8065" }
        $octopusUrl = $octopusUrl.TrimEnd("/")
        $octopusApiKey = $env:OCTOPUS_API_KEY
        if ([string]::IsNullOrWhiteSpace($octopusApiKey)) { throw "OCTOPUS_API_KEY is not set" }
        $octopusHeaders = @{ "X-Octopus-ApiKey" = $octopusApiKey }
        function Invoke-OctopusApi([string]$Path) {
          $uri = if ($Path.StartsWith("http", [System.StringComparison]::OrdinalIgnoreCase)) { $Path } else { "$octopusUrl$Path" }
          Invoke-RestMethod -Method Get -Uri $uri -Headers $octopusHeaders
        }
        function Get-OctopusNamedItem([array]$Items, [string]$Name, [string]$Kind) {
          $item = @($Items | Where-Object { $_.Name -eq $Name })[0]
          if (-not $item) { throw "Octopus $Kind not found: $Name" }
          $item
        }
        function Wait-OctopusDeployment([string]$Version) {
          $space = Get-OctopusNamedItem (Invoke-OctopusApi "/api/spaces/all") "$(octopusSpace)" "space"
          $project = Get-OctopusNamedItem (Invoke-OctopusApi "/api/$($space.Id)/projects/all") "$(octopusProject)" "project"
          $environment = Get-OctopusNamedItem (Invoke-OctopusApi "/api/$($space.Id)/environments/all") "$(octopusEnvironment)" "environment"
          $release = Invoke-OctopusApi "/api/$($space.Id)/projects/$($project.Id)/releases/$Version"
          $deadline = (Get-Date).AddMinutes(30)
          $lastTaskState = ""
          do {
            $deployments = Invoke-OctopusApi "/api/$($space.Id)/releases/$($release.Id)/deployments?skip=0&take=20"
            $deployment = @($deployments.Items |
              Where-Object { $_.EnvironmentId -eq $environment.Id } |
              Sort-Object Created -Descending |
              Select-Object -First 1)
            if (-not $deployment) {
              Write-Host "Waiting for Octopus deployment record for release $Version..."
              Start-Sleep -Seconds 5
              continue
            }
            $task = Invoke-OctopusApi "/api/$($space.Id)/tasks/$($deployment.TaskId)"
            $state = "$($task.Id): $($task.State)"
            if ($state -ne $lastTaskState) {
              Write-Host "Octopus deployment task $state"
              $lastTaskState = $state
            }
            if ($task.IsCompleted) {
              if (-not $task.FinishedSuccessfully) {
                throw "Octopus deployment $($deployment.Id) failed: $($task.ErrorMessage)"
              }
              Write-Host "Octopus deployment $($deployment.Id) completed successfully."
              return
            }
            Start-Sleep -Seconds 10
          } while ((Get-Date) -lt $deadline)
          throw "Timed out waiting for Octopus deployment for release $Version"
        }
        octopus release create --project "$(octopusProject)" --version $ver --no-prompt
        if ($LASTEXITCODE -ne 0) { throw "octopus release create failed" }
        octopus release deploy --project "$(octopusProject)" --version $ver --environment "$(octopusEnvironment)" --no-prompt
        if ($LASTEXITCODE -ne 0) { throw "octopus release deploy failed" }
        Wait-OctopusDeployment $ver
      displayName: Create + deploy Octopus release
