# Azure Pipeline for AI Auto Repairman (Azure DevOps org: McpServer).
#
# Three stages:
#   1. Test        - backend unit tests (store + admin) on a Microsoft-hosted agent.
#   2. PublishApp  - publish the PWA (docs/) to the GitHub Pages repo sharpninja/repairs.
#   3. DeploySvc   - package the submit service (server/) and deploy it to Octopus on
#                    PAYTON-DESKTOP, which deploys to the Windows target via its Tentacle.
#
# PREREQUISITES (set these up before the pipeline can fully run):
#   - GITHUB_PAT : secret pipeline variable = a GitHub PAT with repo:contents write on
#                  sharpninja/repairs (used to publish docs/ -> GitHub Pages).
#   - A self-hosted Azure DevOps agent in pool 'OctopusLan' on a LAN machine that can
#     reach http://payton-desktop:8065 (Microsoft-hosted agents cannot reach it). That
#     agent picks up OCTOPUS_URL / OCTOPUS_API_KEY / OCTOPUS_SPACE from machine env vars
#     (already registered on PAYTON-DESKTOP and PAYTON-LEGION2).
#   - The Octopus server must be LICENSED (the initialisation license allows 0 projects /
#     0 targets) and have a project matching var 'octopusProject' with a deployment
#     process + the 'Production' environment target registered. Until then, DeploySvc fails.

trigger:
  branches:
    include: [ main ]

variables:
  octopusProject: 'AI Auto Repairman Service'
  octopusEnvironment: 'Production'
  octopusSpace: 'Default'

stages:
- stage: Test
  displayName: Test
  jobs:
  - job: Backend
    pool:
      vmImage: 'windows-latest'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
    - script: cd server && npm ci
      displayName: install server deps
    - script: node tests/store.test.mjs
      displayName: store unit tests
    - script: node tests/admin.test.mjs
      displayName: admin dashboard unit tests

- stage: PublishApp
  displayName: Publish app to GitHub Pages
  dependsOn: Test
  condition: succeeded()
  jobs:
  - job: PublishPages
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    - script: |
        set -e
        git config --global user.email "ci@thesharp.ninja"
        git config --global user.name "Azure Pipeline"
        git clone "https://$(GITHUB_PAT)@github.com/sharpninja/repairs.git" ghpages
        rm -rf ghpages/docs
        cp -r docs ghpages/docs
        cd ghpages
        git add docs
        git commit -m "publish app $(Build.BuildNumber) [skip ci]" || echo "no app changes to publish"
        git push origin HEAD:main
      displayName: Publish docs/ to sharpninja/repairs (GitHub Pages)

- stage: DeployService
  displayName: Deploy service to Octopus (PAYTON-DESKTOP)
  dependsOn: Test
  condition: succeeded()
  jobs:
  - deployment: DeployToOctopus
    pool:
      name: 'OctopusLan'   # self-hosted agent that can reach http://payton-desktop:8065
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - powershell: |
              $ver = "$(Build.BuildNumber)"
              octopus package zip create --id repairs-service --version $ver --include "server/src/**" --include "server/package.json" --include "server/package-lock.json" --include "server/Dockerfile" --include "server/proto/**" --out-folder "$(Build.ArtifactStagingDirectory)"
              octopus package upload --package "$(Build.ArtifactStagingDirectory)/repairs-service.$ver.zip" --overwrite-mode overwrite
              octopus release create --project "$(octopusProject)" --version $ver --package "repairs-service:$ver"
              octopus release deploy --project "$(octopusProject)" --version $ver --environment "$(octopusEnvironment)"
            displayName: Package + push + release + deploy to Octopus
            env:
              OCTOPUS_URL: $(OCTOPUS_URL)
              OCTOPUS_API_KEY: $(OCTOPUS_API_KEY)
              OCTOPUS_SPACE: $(octopusSpace)
