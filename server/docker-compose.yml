# Two processes from one image: the submit service (opens PRs) and the monitor
# (polls submission PRs and moderates them with the Claude Code CLI). They share
# a named volume so sessions + trust/rate state persist and are visible to both.
# `docker compose up --build`.
services:
  submit:
    build: .
    env_file: .env
    # Host:container port from ${PORT} in .env (defaults to 8788; never 8080).
    ports:
      - "${PORT:-8788}:${PORT:-8788}"
    volumes:
      - data:/app/data
    restart: unless-stopped

  monitor:
    build: .
    env_file: .env
    command: ["node", "src/monitor.js"]
    volumes:
      - data:/app/data
    restart: unless-stopped

  # Public HTTPS tunnel to the submit service (so the deployed app / a phone can
  # reach it). Reads NGROK_AUTHTOKEN from .env. Web inspector on :4040 exposes the
  # generated public URL at http://localhost:4040/api/tunnels.
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: ["http", "--url=sharpninja.ngrok.app", "submit:8788", "--log=stdout"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - submit

volumes:
  data:
