<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CR-V 1.5T Session 1 — Repair App</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --card2:#1d2028; --ink:#f4f6fb; --muted:#aab3c5;
    --line:#2a2f3a; --accent:#4da3ff;
    --danger:#ff4d4d; --danger-bg:#3a1414;
    --crit:#ff9f1c; --crit-bg:#3a2a10;
    --tip:#39d98a; --tip-bg:#0f2e22;
    --pad: clamp(16px, 4.5vw, 32px);
    --h1: clamp(26px, 7.5vw, 44px);
    --h2: clamp(21px, 6vw, 34px);
    --body: clamp(17px, 4.4vw, 22px);
    --big: clamp(19px, 5vw, 26px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:var(--body);line-height:1.45;-webkit-text-size-adjust:100%;overscroll-behavior-y:none}
  button{font-family:inherit}
  a{color:var(--accent)}
  .hidden{display:none !important}

  /* top bar */
  #top{position:sticky;top:0;z-index:40;background:#000b;backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:calc(8px + env(safe-area-inset-top)) var(--pad) 8px;display:flex;align-items:center;gap:12px}
  #top .home{background:var(--card);border:1px solid var(--line);color:var(--ink);
    width:44px;height:44px;border-radius:12px;font-size:20px;cursor:pointer;flex:0 0 auto}
  #top .title{font-weight:800;font-size:.86em;color:var(--muted);flex:1;overflow:hidden;
    white-space:nowrap;text-overflow:ellipsis}
  #top .pct{font-weight:900;font-variant-numeric:tabular-nums;color:var(--accent);flex:0 0 auto}
  #topbar{height:4px;background:var(--line)}
  #topbar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s}

  main{max-width:860px;margin:0 auto;padding:var(--pad) var(--pad) 120px}

  h1{font-size:var(--h1);line-height:1.05;margin:.1em 0;font-weight:900;letter-spacing:-.01em}
  h2{font-size:var(--h2);line-height:1.1;margin:.15em 0;font-weight:850}
  .lead{color:var(--muted);font-size:var(--big)}
  .kicker{display:inline-flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.05em;
    text-transform:uppercase;font-size:clamp(12px,3.2vw,15px);color:#fff;padding:7px 13px;
    border-radius:999px;align-self:flex-start}
  ul,ol{margin:.2em 0;padding-left:1.15em}
  li{margin:.4em 0}
  strong{font-weight:800}

  .call{border-radius:14px;padding:13px 15px;border:1.5px solid;font-weight:650;
    display:flex;gap:11px;align-items:flex-start;margin:10px 0;font-size:var(--body)}
  .call .ic{font-size:1.4em;line-height:1}
  .call .t{display:block;font-weight:900;text-transform:uppercase;letter-spacing:.04em;font-size:.78em;margin-bottom:2px}
  .danger{background:var(--danger-bg);border-color:var(--danger);color:#ffd7d7}.danger .t{color:#ff8b8b}
  .crit{background:var(--crit-bg);border-color:var(--crit);color:#ffe6c2}.crit .t{color:var(--crit)}
  .tip{background:var(--tip-bg);border-color:var(--tip);color:#c8f7e3}.tip .t{color:var(--tip)}
  .specbox{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--accent);
    border-radius:12px;padding:11px 15px;margin:10px 0}
  .specbox b{color:var(--accent)}
  .verify{color:var(--crit);font-size:.84em;font-weight:700}

  .steps{counter-reset:s;list-style:none;padding:0;margin:.3em 0}
  .steps>li{counter-increment:s;position:relative;padding:11px 12px 11px 52px;margin:.4em 0;
    background:var(--card);border:1px solid var(--line);border-radius:14px}
  .steps>li::before{content:counter(s);position:absolute;left:11px;top:11px;width:30px;height:30px;
    background:var(--accent);color:#04121f;border-radius:9px;display:grid;place-content:center;font-weight:900;font-size:.85em}

  figure{margin:12px 0;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  figure svg{width:100%;height:auto;max-height:44vh;color:var(--ink)}
  figcaption{color:var(--muted);font-size:.82em;margin-top:8px}

  /* checklist */
  .check{list-style:none;padding:0;margin:.3em 0}
  .check li{display:flex;gap:13px;align-items:flex-start;padding:12px 14px;margin:.4em 0;
    background:var(--card);border:1px solid var(--line);border-radius:14px}
  .check input{appearance:none;-webkit-appearance:none;min-width:30px;height:30px;margin-top:1px;
    border:2.5px solid var(--muted);border-radius:8px;background:transparent;cursor:pointer;
    display:inline-grid;place-content:center;transition:.15s;flex:0 0 auto}
  .check input:checked{background:var(--tip);border-color:var(--tip)}
  .check input:checked::after{content:"";width:9px;height:17px;border:solid #06231a;border-width:0 5px 5px 0;transform:rotate(45deg) translateY(-2px)}
  .check label{cursor:pointer;flex:1}
  .check .done{opacity:.5;text-decoration:line-through}

  /* home dashboard */
  .hero{background:linear-gradient(160deg,#1b2230,#12151c);border:1px solid var(--line);
    border-radius:18px;padding:20px;margin-bottom:16px}
  .ring{--v:0;width:132px;height:132px;border-radius:50%;margin:6px auto 10px;
    background:conic-gradient(var(--accent) calc(var(--v)*1%),var(--line) 0);
    display:grid;place-content:center;position:relative}
  .ring::before{content:"";position:absolute;inset:12px;background:#12151c;border-radius:50%}
  .ring b{position:relative;font-size:30px;font-weight:900;font-variant-numeric:tabular-nums}
  .ring small{position:relative;display:block;text-align:center;color:var(--muted);font-size:12px;font-weight:700}
  .phaselist{display:grid;gap:10px}
  .prow{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px 15px;cursor:pointer;text-align:left;width:100%;color:var(--ink)}
  .prow:active{transform:scale(.995)}
  .prow .dot{width:38px;height:38px;border-radius:11px;display:grid;place-content:center;font-weight:900;flex:0 0 auto;color:#fff}
  .prow .meta{flex:1;min-width:0}
  .prow .meta b{display:block;font-size:1em}
  .prow .meta .bar{height:6px;background:var(--line);border-radius:3px;margin-top:7px;overflow:hidden}
  .prow .meta .bar>i{display:block;height:100%;background:var(--tip);width:0}
  .prow .cnt{font-size:.8em;color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto}
  .prow.doneall .dot{background:var(--tip)!important}

  /* bottom nav */
  #nav{position:fixed;left:0;right:0;bottom:0;z-index:45;display:flex;gap:10px;align-items:center;
    padding:10px var(--pad) calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,var(--bg) 45%)}
  #nav button{flex:1;font-size:clamp(15px,4.2vw,19px);font-weight:800;padding:14px;border-radius:14px;
    border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer}
  #nav .primary{background:var(--accent);color:#04121f;border-color:var(--accent);flex:1.3}
  #nav button:disabled{opacity:.35}

  /* photos */
  .photobar{margin:14px 0}
  .photobtn{display:inline-flex;gap:9px;align-items:center;background:var(--card);border:1px dashed var(--accent);
    color:var(--accent);border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;font-size:.95em}
  .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .thumb{position:relative;width:78px;height:78px;border-radius:11px;overflow:hidden;border:1px solid var(--line);background:#000}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .x{position:absolute;top:2px;right:2px;width:22px;height:22px;border-radius:50%;background:#000a;
    color:#fff;border:none;font-size:14px;cursor:pointer;line-height:22px}
  .thumb .ask{position:absolute;bottom:0;left:0;right:0;background:#000a;color:var(--accent);border:none;
    font-size:11px;font-weight:800;padding:3px 0;cursor:pointer}

  /* floating Ask Claude */
  #ask{position:fixed;right:16px;bottom:calc(80px + env(safe-area-inset-bottom));z-index:46;
    background:var(--accent);color:#04121f;border:none;border-radius:999px;padding:13px 18px;
    font-weight:900;font-size:15px;box-shadow:0 8px 24px #0007;cursor:pointer;display:flex;gap:8px;align-items:center}

  /* modal / sheet */
  .sheet{position:fixed;inset:0;z-index:80;background:#000a;display:flex;align-items:flex-end;justify-content:center}
  .sheet .panel{background:var(--bg);border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;
    max-width:860px;max-height:92dvh;display:flex;flex-direction:column;animation:up .22s ease}
  @keyframes up{from{transform:translateY(30px);opacity:.5}to{transform:none;opacity:1}}
  .sheet .head{display:flex;align-items:center;gap:10px;padding:14px var(--pad);border-bottom:1px solid var(--line)}
  .sheet .head b{flex:1;font-size:1.05em}
  .sheet .head .cl{background:var(--card);border:1px solid var(--line);color:var(--ink);width:38px;height:38px;
    border-radius:11px;font-size:18px;cursor:pointer}
  .sheet .body{padding:14px var(--pad);overflow:auto;-webkit-overflow-scrolling:touch}

  /* chat */
  #chatlog{display:flex;flex-direction:column;gap:12px}
  .msg{max-width:88%;padding:11px 14px;border-radius:15px;font-size:.97em;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
  .msg.u{align-self:flex-end;background:var(--accent);color:#04121f;border-bottom-right-radius:5px}
  .msg.a{align-self:flex-start;background:var(--card2);border:1px solid var(--line);border-bottom-left-radius:5px}
  .msg.a strong{color:var(--accent)}
  .msg img{max-width:160px;border-radius:10px;display:block;margin-bottom:8px}
  .msg.err{background:var(--danger-bg);border:1px solid var(--danger);color:#ffd7d7}
  .typing{align-self:flex-start;color:var(--muted);font-style:italic;padding:6px 4px}
  .chatinput{display:flex;gap:8px;padding:12px var(--pad) calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);align-items:flex-end}
  .chatinput textarea{flex:1;background:var(--card);border:1px solid var(--line);color:var(--ink);
    border-radius:14px;padding:11px 13px;font-size:16px;resize:none;max-height:120px;font-family:inherit}
  .chatinput .send{background:var(--accent);color:#04121f;border:none;border-radius:14px;width:52px;height:48px;font-size:20px;font-weight:900;cursor:pointer;flex:0 0 auto}
  .chatinput .send:disabled{opacity:.4}
  .attachchip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);
    border-radius:999px;padding:4px 10px;font-size:.8em;color:var(--muted);margin:0 var(--pad) 8px}
  .attachchip img{width:26px;height:26px;border-radius:6px;object-fit:cover}
  .field{margin:12px 0}
  .field label{display:block;font-weight:700;margin-bottom:6px;font-size:.92em}
  .field input{width:100%;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:12px;font-size:16px}
  .btnrow{display:flex;gap:10px;margin-top:14px}
  .btn{flex:1;padding:13px;border-radius:13px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-weight:800;cursor:pointer}
  .btn.pri{background:var(--accent);color:#04121f;border-color:var(--accent)}
  .btn.dgr{background:var(--danger-bg);border-color:var(--danger);color:#ffd7d7}
  .fine{color:var(--muted);font-size:.82em}

  /* camera */
  #camwrap{position:fixed;inset:0;z-index:90;background:#000;display:flex;flex-direction:column}
  #camwrap video{flex:1;width:100%;object-fit:cover;background:#000}
  #camwrap .camctl{display:flex;gap:16px;justify-content:center;align-items:center;padding:18px 0 calc(24px + env(safe-area-inset-bottom))}
  #camwrap .shutter{width:72px;height:72px;border-radius:50%;background:#fff;border:5px solid #bbb;cursor:pointer}
  #camwrap .camx{position:absolute;top:calc(14px + env(safe-area-inset-top));left:14px;background:#000a;color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer}
  #camwrap .flip{background:#000a;color:#fff;border:1px solid #666;border-radius:999px;padding:12px 18px;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div id="top">
  <button class="home" id="homeBtn" title="Home">☰</button>
  <div class="title" id="topTitle">2018 CR-V 1.5T · Session 1</div>
  <div class="pct" id="topPct">0%</div>
</div>
<div id="topbar"><i id="topbarFill"></i></div>

<main id="view"></main>

<button id="ask">💬 Ask Claude</button>

<nav id="nav" class="hidden">
  <button id="prev">‹ Back</button>
  <button id="next" class="primary">Next ›</button>
</nav>

<script>
/* ============================================================= CONTENT MODEL */
const PHASES = [
  {id:"p0", name:"Phase 0 · Prep & Safety", color:"#556", steps:[
    {t:"Cold engine. Confirm. Stage parts.", allowPhoto:true, html:`
      <div class="call danger"><span class="ic">🛑</span><div><span class="t">Engine must be stone cold</span>The cooling system is pressurized hot. No draining, no cap off, no HG-1 until you can hold the radiator hose comfortably.</div></div>
      <ul class="check" data-check>
        <li><input type="checkbox"><label>Refrigerant recovered — gauge reads <strong>0 psi</strong> (confirm with the recovery shop)</label></li>
        <li><input type="checkbox"><label>Battery <strong>NEGATIVE (−) terminal disconnected</strong>, cable tucked aside</label></li>
        <li><input type="checkbox"><label>Two <strong>drain pans</strong> ready (1 coolant, 1 old compressor oil)</label></li>
        <li><input type="checkbox"><label>Parts staged: compressor, condenser w/ drier, O-ring kit, <strong>correct R-1234yf A/C oil</strong>, coolant, ECT2 + O-ring, HG-1</label></li>
        <li><input type="checkbox"><label>Clear <strong>mL measuring cup</strong> for the old compressor oil</label></li>
      </ul>
      <div class="call crit"><span class="ic">⚠️</span><div><span class="t">Your system is R-1234yf</span>Do <b>not</b> use generic R-134a PAG46. Honda R-1234yf systems spec their own oil (ND-OIL 12 / POE per Honda service info). Confirm the exact oil for your VIN and let the shop set the final charge.</div></div>`},
  ]},
  {id:"p1", name:"Phase 1 · Lift & Drain", color:"#2f7dd1", steps:[
    {t:"Jack stands → splash shield → coolant", allowPhoto:true, html:`
      <ol class="steps">
        <li>Raise the front and set on <strong>jack stands</strong> on level, solid ground. Chock the rear wheels.</li>
        <li>Remove the <strong>lower splash shield / undertray</strong> (8/10 mm bolts + push clips).</li>
        <li>Place <strong>drain pan #1</strong> under the radiator's driver-side lower tank.</li>
        <li>Open the <strong>radiator petcock</strong>; loosen the cap/fill neck to speed flow.</li>
      </ol>
      <div class="call danger"><span class="ic">🛑</span><div><span class="t">Never work under a car on the jack alone</span>Rated stands, chocked wheels, level ground — every time.</div></div>
      <div class="call tip"><span class="ic">💡</span><div><span class="t">Note the volume</span>Roughly how much drains tells you how much to put back. System holds ~6.2 L (≈6.5 qt).</div></div>`},
  ]},
  {id:"p2", name:"Phase 2 · Front Bumper", color:"#8a5a2b", steps:[
    {t:"Free the bumper for condenser room", allowPhoto:true, diagram:"bumper", html:`
      <ol class="steps">
        <li>Remove <strong>top-edge fasteners</strong> along the radiator support (push clips / 8 mm).</li>
        <li>Turn the wheels; remove <strong>2–3 screws per wheel-well</strong> where the liner meets the bumper.</li>
        <li>Pull the <strong>lower push-clips</strong> along the bottom lip.</li>
        <li>Release the side clips (pull the corner outward at the fender) and lower the cover.</li>
      </ol>
      <div class="call crit"><span class="ic">⚠️</span><div><span class="t">Plastic clips break — that's normal</span>Have <b>replacement clips</b> ready; note which ones broke.</div></div>`},
  ]},
  {id:"p3", name:"Phase 3 · A/C", color:"#b0413e", steps:[
    {t:"A/C ▸ Open lines → CAP INSTANTLY", allowPhoto:true, diagram:"acloc", html:`
      <ol class="steps">
        <li>Unplug the <strong>compressor clutch connector</strong>.</li>
        <li>Unbolt the <strong>suction &amp; discharge line flanges</strong> at the compressor.</li>
      </ol>
      <div class="call danger"><span class="ic">🛑</span><div><span class="t">Never open a line under pressure</span>Confirm 0 psi first. Pressurized refrigerant can cause frostbite / eye injury.</div></div>
      <div class="call danger"><span class="ic">🛑</span><div><span class="t">CAP EVERY OPEN LINE IMMEDIATELY</span>The second a fitting is open, plug it. Moisture in an open system ruins the new parts and the recharge.</div></div>`},
    {t:"A/C ▸ Remove compressor · drain & MEASURE oil", allowPhoto:true, html:`
      <ol class="steps">
        <li>Remove the <strong>4 compressor mounting bolts</strong>; lift it out.</li>
        <li>Tip it and <strong>drain the oil into your mL cup</strong>. Rotate the shaft to get most of it out.</li>
        <li><strong>Write the measured amount down</strong> — the shop needs it to balance total system oil.</li>
      </ol>
      <div class="call crit"><span class="ic">⚠️</span><div><span class="t">Measure, don't guess</span>Old oil out is your reference so the new system isn't over/under-filled.</div></div>`},
    {t:"A/C ▸ Remove the old condenser", allowPhoto:true, html:`
      <ol class="steps">
        <li>Disconnect the <strong>two condenser lines</strong> — <strong>cap instantly</strong>.</li>
        <li>Remove the <strong>upper mounting bolts / brackets</strong>.</li>
        <li>Lift the condenser <strong>up and out</strong> of its lower rubber mounts.</li>
      </ol>
      <div class="call crit"><span class="ic">⚠️</span><div><span class="t">Mind the radiator fins</span>Don't drag the condenser across the radiator — bent fins hurt cooling.</div></div>
      <div class="call tip"><span class="ic">💡</span><div><span class="t">New condenser = fresh drier</span>Exactly why we replace it with the system open.</div></div>`},
    {t:"A/C ▸ Prep the new compressor", allowPhoto:true, html:`
      <ol class="steps">
        <li><strong>Set the oil charge</strong> to match the system (final balance confirmed at the shop with your measured number).</li>
        <li>Pour the measured oil into the <strong>SUCTION port</strong>.</li>
        <li><strong>HAND-ROTATE the pulley 8–10 full turns</strong> to pre-lube the internals.</li>
      </ol>
      <div class="call danger"><span class="ic">🛑</span><div><span class="t">Hand-rotate before it ever runs</span>Skipping this can seize a dry compressor on first start. 8–10 slow turns, by hand.</div></div>
      <div class="call crit"><span class="ic">⚠️</span><div><span class="t">Right oil for R-1234yf</span>Use the Honda-spec R-1234yf oil (ND-OIL 12 / POE) — <b>not</b> generic R-134a PAG46. Confirm on the underhood label.</div></div>`},
    {t:"A/C ▸ Oil condenser · install · torque", allowPhoto:true, html:`
      <ol class="steps">
        <li>Add <strong>~1 oz (≈30 mL)</strong> of the correct oil to the new condenser.</li>
        <li>Install condenser, then compressor. Torque the <strong>4 compressor bolts</strong>.</li>
        <li>At <strong>every</strong> fitting install a <strong>NEW, oiled O-ring</strong>. Reconnect flanges &amp; clutch plug.</li>
      </ol>
      <div class="specbox"><b>Torque (typical Honda A/C — verify vs service manual):</b> line flanges ≈9.8–12 N·m (7–9 lb-ft) · compressor mounts ≈24–25 N·m (18 lb-ft) · condenser fittings ≈9.8 N·m (7 lb-ft). <span class="verify">Confirm for your VIN before final torque.</span></div>
      <div class="call danger"><span class="ic">🛑</span><div><span class="t">A missed O-ring is the #1 leak</span>Every fitting. New. Oiled. No reused O-rings, ever.</div></div>`},
  ]},
  {id:"p4", name:"Phase 4 · ECT Sensor 2", color:"#2f8f6b", steps:[
    {t:"Swap the lower-radiator ECT2", allowPhoto:true, diagram:"ect2", html:`
      <ol class="steps">
        <li><strong>Unplug</strong> the ECT2 connector.</li>
        <li>Unscrew the old sensor with a <strong>deep socket — measure the flats first</strong> (reports split 17 mm vs 19 mm; bring both).</li>
        <li>Fit the <strong>new O-ring</strong>; thread the new sensor in by hand, then snug.</li>
      </ol>
      <div class="call crit"><span class="ic">⚠️</span><div><span class="t">Don't overtighten the plastic tank</span>It threads into a plastic radiator tank. No metal-boss torque spec — seat on the O-ring, then <b>hand-tight + a small nudge only</b>. Overtightening cracks the tank.</div></div>`},
  ]},
  {id:"p5", name:"Phase 5 · Reassemble", color:"#6a5acd", steps:[
    {t:"Bumper → splash shield → battery", allowPhoto:false, html:`
      <ul class="check" data-check>
        <li><input type="checkbox"><label>Reinstall bumper cover — <strong>replace every broken clip</strong></label></li>
        <li><input type="checkbox"><label>Wheel-well screws, top-edge fasteners, lower clips all in</label></li>
        <li><input type="checkbox"><label>Reinstall the <strong>lower splash shield / undertray</strong></label></li>
        <li><input type="checkbox"><label>Radiator <strong>petcock CLOSED</strong> before refilling</label></li>
        <li><input type="checkbox"><label><strong>Reconnect the battery (−)</strong>, snug it</label></li>
      </ul>
      <div class="call crit"><span class="ic">⚠️</span><div><span class="t">Petcock closed?</span>Easy to forget — fresh coolant will pour onto the floor if it's open.</div></div>`},
  ]},
  {id:"p6", name:"Phase 6 · Coolant + HG-1 + Bleed", color:"#c07b1e", steps:[
    {t:"Refill 50/50 · HG-1 cold · burp the air", allowPhoto:true, html:`
      <ol class="steps">

/* flatten steps with global index + stable id */
const STEPS = [];
PHASES.forEach((ph,pi)=>ph.steps.forEach((st,si)=>{
  st.phase=ph; st.pi=pi; st.si=si; st.id=ph.id+"-"+si; st.gi=STEPS.length; STEPS.push(st);
}));
const TOTAL_STEPS = STEPS.length;

/* ============================================================= STATE (localStorage) */
const LS="crvapp1";
function load(){ try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return {}} }
function save(s){ localStorage.setItem(LS, JSON.stringify(s)); }
let state = load();
state.checks = state.checks||{};   // "stepid#idx" -> bool
state.done = state.done||{};       // stepid -> bool (all checks in step ticked / visited-complete)
state.apiKey = state.apiKey||"";

/* ============================================================= IndexedDB for photos */
let db;
function openDB(){ return new Promise((res,rej)=>{
  const r=indexedDB.open("crv-photos",1);
  r.onupgradeneeded=e=>{ const d=e.target.result; if(!d.objectStoreNames.contains("photos")) d.createObjectStore("photos",{keyPath:"id",autoIncrement:true}); };
  r.onsuccess=e=>{db=e.target.result;res(db)}; r.onerror=e=>rej(e);
});}
function putPhoto(stepId,dataUrl){ return new Promise((res,rej)=>{ const tx=db.transaction("photos","readwrite"); tx.objectStore("photos").add({stepId,dataUrl,ts:Date.now()}); tx.oncomplete=()=>res(); tx.onerror=rej; });}
function getPhotos(stepId){ return new Promise((res)=>{ const out=[]; const tx=db.transaction("photos","readonly"); const cur=tx.objectStore("photos").openCursor(); cur.onsuccess=e=>{const c=e.target.result; if(c){ if(c.value.stepId===stepId) out.push({id:c.value.id,dataUrl:c.value.dataUrl}); c.continue(); } else res(out);}; });}
function delPhoto(id){ return new Promise((res)=>{ const tx=db.transaction("photos","readwrite"); tx.objectStore("photos").delete(id); tx.oncomplete=()=>res(); });}

/* ============================================================= PROGRESS */
function stepChecks(st){ // number of checkboxes in a step's html
  const m = st.html.match(/type="checkbox"/g); return m?m.length:0;
}
function stepComplete(st){
  const n=stepChecks(st);
  if(n>0){ for(let i=0;i<n;i++){ if(!state.checks[st.id+"#"+i]) return false; } return true; }
  return !!state.done[st.id]; // no checkboxes -> completed when marked done (Next pressed)
}
function phaseProgress(ph){
  const done=ph.steps.filter(stepComplete).length; return {done,total:ph.steps.length};
}
function overallPct(){
  let done=0; STEPS.forEach(st=>{ if(stepComplete(st)) done++; });
  return Math.round(done/TOTAL_STEPS*100);
}
function refreshTop(){
  const p=overallPct(); document.getElementById("topPct").textContent=p+"%";
  document.getElementById("topbarFill").style.width=p+"%";
}

/* ============================================================= ROUTER / RENDER */
let cur = null; // current global step index, or null = home
const view=document.getElementById("view");
const nav=document.getElementById("nav");

function go(gi){ cur=gi; render(); window.scrollTo(0,0); }
function goHome(){ cur=null; render(); window.scrollTo(0,0); }

function render(){
  refreshTop();
  if(cur===null){ renderHome(); nav.classList.add("hidden"); document.getElementById("topTitle").textContent="2018 CR-V 1.5T · Session 1"; return; }
  renderStep(STEPS[cur]); nav.classList.remove("hidden");
}

function renderHome(){
  const p=overallPct();
  let rows="";
  PHASES.forEach(ph=>{
    const pr=phaseProgress(ph); const pct=Math.round(pr.done/pr.total*100);
    const all=pr.done===pr.total;
    rows+=`<button class="prow ${all?'doneall':''}" data-gi="${ph.steps[0].gi}">
      <span class="dot" style="background:${ph.color}">${all?'✓':ph.id.slice(1)}</span>
      <span class="meta"><b>${ph.name}</b><span class="bar"><i style="width:${pct}%"></i></span></span>
      <span class="cnt">${pr.done}/${pr.total}</span></button>`;
  });
  view.innerHTML=`
    <div class="hero">
      <div class="ring" style="--v:${p}"><b>${p}%</b><small>complete</small></div>
      <h1 style="text-align:center;font-size:clamp(22px,6vw,32px)">2018 Honda CR-V 1.5T</h1>
      <p class="lead" style="text-align:center;margin:.2em 0 0">Session 1 · A/C + condenser, ECT2, HG-1. Tap a phase to start.</p>
    </div>
    <div class="phaselist">${rows}</div>
    <div class="call danger" style="margin-top:16px"><span class="ic">🛑</span><div><span class="t">The 5 rules</span>1) Never open A/C under pressure. 2) Cap every open line instantly. 3) New oiled O-ring at every fitting. 4) Hand-rotate the new compressor. 5) HG-1 cold, ½ bottle.</div></div>
    <div class="btnrow"><button class="btn" id="resetBtn">Reset progress</button><button class="btn" id="keyBtn">⚙️ Claude API key</button></div>
    <p class="fine" style="margin-top:14px">Photos &amp; progress are stored on this device only. Camera and installing to home screen need HTTPS or localhost. The in-app Claude helper uses your own Anthropic API key — see the ⚙️ button.</p>`;
  view.querySelectorAll(".prow").forEach(b=>b.onclick=()=>go(+b.dataset.gi));
  document.getElementById("resetBtn").onclick=resetProgress;
  document.getElementById("keyBtn").onclick=openKey;
}

function renderStep(st){
  document.getElementById("topTitle").textContent=st.phase.name;
  const fig = st.diagram?`<figure>${DIAGRAMS[st.diagram]}</figure>`:"";
  const photo = st.allowPhoto?`<div class="photobar">
      <button class="photobtn" id="camBtn">📷 Add a photo of this step</button>
      <div class="thumbs" id="thumbs"></div></div>`:"";
  view.innerHTML=`
    <span class="kicker" style="background:${st.phase.color}">${st.phase.name}</span>
    <h2>${st.t}</h2>
    ${fig}
    ${st.html}
    ${photo}`;
  // wire checkboxes
  view.querySelectorAll('input[type=checkbox]').forEach((cb,i)=>{
    const key=st.id+"#"+i;
    cb.checked=!!state.checks[key];
    if(cb.checked) cb.closest('li').querySelector('label').classList.add('done');
    cb.onchange=()=>{ state.checks[key]=cb.checked; save(state);
      cb.closest('li').querySelector('label').classList.toggle('done',cb.checked); refreshTop(); };
  });
  // nav
  document.getElementById("prev").disabled = st.gi===0;
  const nx=document.getElementById("next");
  nx.textContent = st.gi===TOTAL_STEPS-1 ? "Finish ✓" : "Next ›";
  document.getElementById("prev").onclick=()=>{ if(st.gi>0) go(st.gi-1); };
  nx.onclick=()=>{ state.done[st.id]=true; save(state); refreshTop();
    if(st.gi<TOTAL_STEPS-1) go(st.gi+1); else goHome(); };
  // photos
  if(st.allowPhoto){ document.getElementById("camBtn").onclick=()=>openCamera(st.id); refreshThumbs(st.id); }
}

async function refreshThumbs(stepId){
  const el=document.getElementById("thumbs"); if(!el) return;
  const ph=await getPhotos(stepId);
  el.innerHTML=ph.map(p=>`<div class="thumb" data-id="${p.id}">
    <img src="${p.dataUrl}"><button class="x" data-del="${p.id}">✕</button>
    <button class="ask" data-ask="${p.id}">Ask Claude</button></div>`).join("");
  el.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{ await delPhoto(+b.dataset.del); refreshThumbs(stepId); });
  el.querySelectorAll("[data-ask]").forEach(b=>b.onclick=()=>{ const img=b.closest(".thumb").querySelector("img").src; openChat(img); });
}

/* ============================================================= CAMERA */
let camStream=null, camFacing="environment", camStepId=null;
async function openCamera(stepId){
  camStepId=stepId;
  const wrap=document.createElement("div"); wrap.id="camwrap";
  wrap.innerHTML=`<button class="camx">✕</button><video autoplay playsinline muted></video>
    <div class="camctl"><button class="flip">⟲ Flip</button><button class="shutter" aria-label="Capture"></button></div>`;
  document.body.appendChild(wrap);
  const video=wrap.querySelector("video");
  async function start(){
    if(camStream) camStream.getTracks().forEach(t=>t.stop());
    try{ camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing},audio:false}); video.srcObject=camStream; }
    catch(e){ closeCam(); alert("Camera unavailable: "+e.message+"\n\nCamera needs HTTPS or localhost and permission."); }
  }
  function closeCam(){ if(camStream) camStream.getTracks().forEach(t=>t.stop()); camStream=null; wrap.remove(); }
  wrap.querySelector(".camx").onclick=closeCam;
  wrap.querySelector(".flip").onclick=()=>{ camFacing = camFacing==="environment"?"user":"environment"; start(); };
  wrap.querySelector(".shutter").onclick=async()=>{
    const c=document.createElement("canvas"); const w=video.videoWidth||1280,h=video.videoHeight||720;
    const scale=Math.min(1,1280/Math.max(w,h)); c.width=w*scale; c.height=h*scale;
    c.getContext("2d").drawImage(video,0,0,c.width,c.height);
    const url=c.toDataURL("image/jpeg",0.82);
    await putPhoto(camStepId,url); closeCam(); refreshThumbs(camStepId);
  };
  start();
}

/* ============================================================= CLAUDE HELPER */
const GUIDE_CONTEXT = `You are the in-app assistant for a DIY repair app covering a 2018 Honda CR-V 1.5L Turbo (L15B7), "Session 1" — done together because they share a coolant drain and front-end teardown:
1) A/C compressor + condenser replacement (refrigerant already professionally recovered; the car is driven to a shop afterward to evacuate & recharge, so this session ends with the A/C system OPEN and EMPTY).
2) Engine Coolant Temperature Sensor 2 (ECT2) replacement in the lower (plastic) radiator tank.
3) Bar's Leaks HG-1 head-gasket stop-leak, half a bottle, added to a COLD engine (system ~6.2 L / 6.5 qt).
Key confirmed facts and safety rules:
- The A/C refrigerant is R-1234yf (user confirmed). Do NOT recommend generic R-134a PAG46 oil; Honda R-1234yf systems use their own oil (ND-OIL 12 / POE per Honda service info) — tell the user to confirm the exact oil for their VIN and let the shop set the final oil charge.
- Never open A/C lines under pressure; confirm 0 psi. Cap every open line immediately to keep out moisture. Use a fresh, oiled O-ring at every A/C fitting (a missed O-ring is the #1 leak). Hand-rotate the new compressor 8-10 turns before it ever runs. DO NOT turn the A/C on after this session — the system is empty; run it dry and you destroy the compressor.
- ECT2 socket is unresolved between 17 mm and 19 mm — advise measuring the flats. It threads into a PLASTIC tank: new O-ring, hand-tight plus a small nudge, do not overtighten.
- Cooling system has NO bleed bolt — it self-bleeds via a pressurized expansion/degas tank. Fill through the tank, cap loose, heater on HIGH, idle until the radiator fan cycles twice, top off. Coolant is Honda Type 2 (blue) 50/50. HG-1 goes in COLD, half bottle.
- A/C torque values are typical-Honda (line flanges ~9.8-12 N·m, compressor mounts ~24-25 N·m/18 lb-ft, condenser fittings ~9.8 N·m) — tell the user to verify against the factory service manual for their VIN.
You help a person working in their driveway with a phone. Be concise and practical. Lead with the answer. Prioritize safety. If a torque/spec isn't certain, say so and tell them to verify against the factory service manual. If they attach a photo, describe what you see and whether it looks correct (e.g. O-ring seated, fitting clean, connector fully seated), and flag anything risky. You are not a substitute for a professional; for anything safety-critical, recommend confirming with a shop.`;

function openChat(attachImg){
  if(attachImg) pendingImage=attachImg;
  const ctx = cur!==null ? `Current step: "${STEPS[cur].t}" (${STEPS[cur].phase.name}).` : "";
  sheet("💬 Ask Claude", `
    <div id="chatlog"></div>
    <div class="typing hidden" id="typing">Claude is thinking…</div>`,
  (panel,footerHost)=>{
    // move chat body to fill, add input in footer
    const foot=document.createElement("div");
    foot.innerHTML=`<div class="attachchip hidden" id="attach"></div>
      <div class="chatinput"><textarea id="chatIn" rows="1" placeholder="Ask about this step…"></textarea>
      <button class="send" id="chatSend">➤</button></div>`;
    footerHost.appendChild(foot);
    const log=panel.querySelector("#chatlog");
    const ta=foot.querySelector("#chatIn"), sendBtn=foot.querySelector("#chatSend");
    ta.oninput=()=>{ ta.style.height="auto"; ta.style.height=Math.min(120,ta.scrollHeight)+"px"; };
    renderChat(log);
    showAttach(foot);
    function submit(){
      const text=ta.value.trim(); if(!text && !pendingImage) return;
      ta.value=""; ta.style.height="auto";
      sendToClaude(text, ctx, log, panel.parentElement.querySelector("#typing")||document.getElementById("typing"), foot);
    }
    sendBtn.onclick=submit;
    ta.onkeydown=e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); submit(); } };
    if(!chatHistory.length){
      log.insertAdjacentHTML("beforeend", msgHtml("a", "Hi — I'm your Session-1 helper. Ask me anything about the A/C swap, the ECT2 sensor, coolant bleed, or HG-1. You can attach a photo of a fitting or O-ring and I'll check it. What's up?"));
    }
    setTimeout(()=>ta.focus(),150);
  }, true);
}

function showAttach(foot){
  const chip=foot.querySelector("#attach");
  if(pendingImage){ chip.classList.remove("hidden"); chip.innerHTML=`<img src="${pendingImage}"> photo attached <button style="background:none;border:none;color:var(--muted);cursor:pointer" id="unatt">✕</button>`;
    chip.querySelector("#unatt").onclick=()=>{ pendingImage=null; chip.classList.add("hidden"); }; }
  else chip.classList.add("hidden");
}

function msgHtml(role,text,img){
  const safe=(text||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  return `<div class="msg ${role}">${img?`<img src="${img}">`:""}${safe}</div>`;
}
function renderChat(log){
  log.innerHTML="";
  chatHistory.forEach(m=>{
    const txt=m.content.filter(b=>b.type==="text").map(b=>b.text).join("");
    const img=m._img||null;
    log.insertAdjacentHTML("beforeend", msgHtml(m.role==="user"?"u":"a", txt, img));
  });
}

async function sendToClaude(text, ctx, log, typing, foot){
  if(!state.apiKey){ closeSheet(); openKey(); return; }
  const content=[];
  const img=pendingImage;
  if(img){ const [meta,b64]=img.split(","); const mt=(meta.match(/data:(.*?);/)||[])[1]||"image/jpeg";
    content.push({type:"image",source:{type:"base64",media_type:mt,data:b64}}); }
  content.push({type:"text",text:text||"Please look at this photo and tell me if it looks correct for this step."});
  const um={role:"user",content}; um._img=img; chatHistory.push(um);
  pendingImage=null; if(foot) showAttach(foot);
  renderChat(log); log.scrollTop=log.scrollHeight;
  typing.classList.remove("hidden"); log.parentElement && (log.scrollTop=log.scrollHeight);

  try{
    const apiMsgs=chatHistory.map(m=>({role:m.role,content:m.content}));
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"content-type":"application/json","x-api-key":state.apiKey,
        "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-opus-4-8",max_tokens:1024,
        system:GUIDE_CONTEXT+"\n\n"+ctx, messages:apiMsgs})
    });
    typing.classList.add("hidden");
    if(!res.ok){ const e=await res.text(); throw new Error("API "+res.status+": "+e.slice(0,300)); }
    const data=await res.json();
    if(data.stop_reason==="refusal"){ log.insertAdjacentHTML("beforeend", msgHtml("a","I can't help with that request. For safety-critical steps, confirm with a professional.")); return; }
    const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim()||"(no response)";
    chatHistory.push({role:"assistant",content:[{type:"text",text:txt}]});
    renderChat(log); log.scrollTop=log.scrollHeight;
  }catch(err){
    typing.classList.add("hidden");
    log.insertAdjacentHTML("beforeend", `<div class="msg err">⚠️ ${String(err.message||err)}<br><span class="fine">Check your API key (⚙️ on the home screen) and network. The key must allow direct browser access.</span></div>`);
    log.scrollTop=log.scrollHeight;
  }
}

/* ============================================================= SHEET helper */
function sheet(title, bodyHtml, wire, chatMode){
  closeSheet();
  const s=document.createElement("div"); s.className="sheet"; s.id="sheet";
  s.innerHTML=`<div class="panel"><div class="head"><b>${title}</b><button class="cl">✕</button></div>
    <div class="body">${bodyHtml}</div></div>`;
  document.body.appendChild(s);
  const panel=s.querySelector(".panel"), body=s.querySelector(".body");
  s.querySelector(".cl").onclick=closeSheet;
  s.onclick=e=>{ if(e.target===s) closeSheet(); };
  if(chatMode){ body.style.flex="1"; body.style.display="block"; }
  wire && wire(body, panel);
}
function closeSheet(){ const s=document.getElementById("sheet"); if(s) s.remove(); }

function resetProgress(){
  sheet("Reset progress?", `<p>This clears all checkmarks and step progress on this device. Your saved photos are kept. Continue?</p>
    <div class="btnrow"><button class="btn" id="rc">Cancel</button><button class="btn dgr" id="ry">Reset</button></div>`,
  (b)=>{ b.querySelector("#rc").onclick=closeSheet; b.querySelector("#ry").onclick=()=>{ state.checks={};state.done={}; save(state); closeSheet(); render(); }; });
}

/* ============================================================= BOOT */
document.getElementById("homeBtn").onclick=goHome;
document.getElementById("ask").onclick=()=>openChat(null);
openDB().then(()=>{ render(); }).catch(()=>{ render(); });
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
