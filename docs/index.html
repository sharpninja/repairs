<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f5">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#262624">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CR-V 1.5T Session 1 — Repair App</title>
<style>
  /* ---------- Claude-ecosystem palette: light default, dark via media/attr ---------- */
  :root{
    --bg:#faf9f5; --card:#ffffff; --card2:#f1efe8; --ink:#20201e; --muted:#75736c;
    --line:#e7e4da; --accent:#d97757; --accent-ink:#ffffff; --accent-soft:#f6e7e0;
    --danger:#b23b2e; --danger-bg:#fbe9e6; --danger-ink:#7e241b;
    --crit:#a76a16; --crit-bg:#fbf0da; --crit-ink:#734810;
    --tip:#2e7d55; --tip-bg:#e3f3ea; --tip-ink:#1b4d34;
    --serif: "Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --pad: clamp(16px, 4.5vw, 32px);
    --h1: clamp(26px, 7.5vw, 44px);
    --h2: clamp(21px, 6vw, 34px);
    --body: clamp(17px, 4.4vw, 22px);
    --big: clamp(19px, 5vw, 26px);
    --shadow: 0 1px 2px rgba(20,19,17,.05), 0 6px 20px rgba(20,19,17,.05);
  }
  /* Dark palette — forced via data-theme="dark" */
  :root[data-theme="dark"]{
    --bg:#262624; --card:#30302e; --card2:#3a3a36; --ink:#f4f3ee; --muted:#a6a49a;
    --line:#403f3a; --accent:#e08a68; --accent-ink:#241812; --accent-soft:#3a2a22;
    --danger:#e5645a; --danger-bg:#38201c; --danger-ink:#ffd7d1;
    --crit:#e0a63f; --crit-bg:#392f18; --crit-ink:#ffe8c2;
    --tip:#5cc78d; --tip-bg:#123324; --tip-ink:#c6f0da;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }
  /* Dark palette — system preference, unless the user forced light */
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#262624; --card:#30302e; --card2:#3a3a36; --ink:#f4f3ee; --muted:#a6a49a;
      --line:#403f3a; --accent:#e08a68; --accent-ink:#241812; --accent-soft:#3a2a22;
      --danger:#e5645a; --danger-bg:#38201c; --danger-ink:#ffd7d1;
      --crit:#e0a63f; --crit-bg:#392f18; --crit-ink:#ffe8c2;
      --tip:#5cc78d; --tip-bg:#123324; --tip-ink:#c6f0da;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    }
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:var(--body);line-height:1.45;-webkit-text-size-adjust:100%;overscroll-behavior-y:none}
  button{font-family:inherit}
  a{color:var(--accent)}
  .hidden{display:none !important}

  #top{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    padding:calc(8px + env(safe-area-inset-top)) var(--pad) 8px;display:flex;align-items:center;gap:10px}
  #top .ib{background:var(--card);border:1px solid var(--line);color:var(--ink);width:44px;height:44px;
    border-radius:12px;font-size:19px;cursor:pointer;flex:0 0 auto;display:grid;place-content:center}
  #top .ib:active{transform:scale(.94)}
  #top .title{font-weight:800;font-size:.84em;color:var(--muted);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  #top .pct{font-weight:900;font-variant-numeric:tabular-nums;color:var(--accent);flex:0 0 auto;min-width:44px;text-align:right}
  #topbar{height:4px;background:var(--line)}
  #topbar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s}

  main{max-width:860px;margin:0 auto;padding:var(--pad) var(--pad) 128px}
  h1{font-family:var(--serif);font-size:var(--h1);line-height:1.06;margin:.1em 0;font-weight:700;letter-spacing:-.01em}
  h2{font-size:var(--h2);line-height:1.12;margin:.15em 0;font-weight:800}
  .lead{color:var(--muted);font-size:var(--big)}
  .kicker{display:inline-flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    font-size:clamp(12px,3.2vw,15px);color:#fff;padding:7px 13px;border-radius:999px;align-self:flex-start}
  ul,ol{margin:.2em 0;padding-left:1.15em}
  li{margin:.4em 0}
  strong{font-weight:800}

  .call{border-radius:14px;padding:13px 15px;border:1.5px solid;font-weight:600;display:flex;gap:11px;align-items:flex-start;margin:10px 0;font-size:var(--body)}
  .call .ic{font-size:1.35em;line-height:1}
  .call .t{display:block;font-weight:900;text-transform:uppercase;letter-spacing:.04em;font-size:.76em;margin-bottom:2px}
  .danger{background:var(--danger-bg);border-color:var(--danger);color:var(--danger-ink)}.danger .t{color:var(--danger)}
  .crit{background:var(--crit-bg);border-color:var(--crit);color:var(--crit-ink)}.crit .t{color:var(--crit)}
  .tip{background:var(--tip-bg);border-color:var(--tip);color:var(--tip-ink)}.tip .t{color:var(--tip)}
  .specbox{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:12px;padding:11px 15px;margin:10px 0;box-shadow:var(--shadow)}
  .specbox b{color:var(--accent)}
  .verify{color:var(--crit);font-size:.84em;font-weight:700}

  .steps{counter-reset:s;list-style:none;padding:0;margin:.3em 0}
  .steps>li{counter-increment:s;position:relative;padding:11px 12px 11px 52px;margin:.4em 0;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  .steps>li::before{content:counter(s);position:absolute;left:11px;top:11px;width:30px;height:30px;background:var(--accent);color:var(--accent-ink);border-radius:9px;display:grid;place-content:center;font-weight:900;font-size:.85em}

  figure{margin:12px 0;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center;box-shadow:var(--shadow)}
  figure svg{width:100%;height:auto;max-height:44vh;color:var(--ink)}
  figcaption{color:var(--muted);font-size:.82em;margin-top:8px}

  .check{list-style:none;padding:0;margin:.3em 0}
  .check li{display:flex;gap:13px;align-items:flex-start;padding:12px 14px;margin:.4em 0;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  .check input{appearance:none;-webkit-appearance:none;min-width:30px;height:30px;margin-top:1px;border:2.5px solid var(--muted);border-radius:8px;background:transparent;cursor:pointer;display:inline-grid;place-content:center;transition:.15s;flex:0 0 auto}
  .check input:checked{background:var(--tip);border-color:var(--tip)}
  .check input:checked::after{content:"";width:9px;height:17px;border:solid #fff;border-width:0 5px 5px 0;transform:rotate(45deg) translateY(-2px)}
  .check label{cursor:pointer;flex:1}
  .check .done{opacity:.5;text-decoration:line-through}

  .hero{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px 20px;margin-bottom:16px;box-shadow:var(--shadow);text-align:center}
  .ring{--v:0;width:130px;height:130px;border-radius:50%;margin:2px auto 12px;background:conic-gradient(var(--accent) calc(var(--v)*1%),var(--line) 0);display:grid;place-content:center;position:relative}
  .ring::before{content:"";position:absolute;inset:12px;background:var(--card);border-radius:50%}
  .ring b{position:relative;font-size:30px;font-weight:900;font-variant-numeric:tabular-nums}
  .ring small{position:relative;display:block;text-align:center;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}

  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
  .tile{display:flex;flex-direction:column;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;text-align:left;color:var(--ink);box-shadow:var(--shadow)}
  .tile .em{font-size:22px}
  .tile b{font-size:.98em}
  .tile span{color:var(--muted);font-size:.78em}

  .phaselist{display:grid;gap:10px}
  .prow{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;cursor:pointer;text-align:left;width:100%;color:var(--ink);box-shadow:var(--shadow)}
  .prow:active{transform:scale(.995)}
  .prow .dot{width:38px;height:38px;border-radius:11px;display:grid;place-content:center;font-weight:900;flex:0 0 auto;color:#fff}
  .prow .meta{flex:1;min-width:0}.prow .meta b{display:block;font-size:1em}
  .prow .meta .bar{height:6px;background:var(--line);border-radius:3px;margin-top:7px;overflow:hidden}
  .prow .meta .bar>i{display:block;height:100%;background:var(--tip);width:0}
  .prow .cnt{font-size:.8em;color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto}
  .prow.doneall .dot{background:var(--tip)!important}

  #nav{position:fixed;left:0;right:0;bottom:0;z-index:45;display:flex;gap:10px;align-items:center;padding:10px var(--pad) calc(10px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 45%)}
  #nav button{flex:1;font-size:clamp(15px,4.2vw,19px);font-weight:800;padding:14px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;box-shadow:var(--shadow)}
  #nav .primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);flex:1.3}
  #nav button:disabled{opacity:.4}

  /* media logging */
  .logbar{margin:14px 0}
  .logbtns{display:flex;gap:8px;flex-wrap:wrap}
  .lbtn{display:inline-flex;gap:8px;align-items:center;background:var(--card);border:1px dashed var(--accent);color:var(--accent);border-radius:13px;padding:11px 15px;font-weight:800;cursor:pointer;font-size:.92em;box-shadow:var(--shadow)}
  .medialist{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .mitem{display:flex;gap:11px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:9px 11px;box-shadow:var(--shadow)}
  .mitem .mth{width:56px;height:56px;border-radius:9px;overflow:hidden;background:#000;flex:0 0 auto;display:grid;place-content:center;color:#fff;font-size:22px}
  .mitem .mth img,.mitem .mth video{width:100%;height:100%;object-fit:cover;display:block}
  .mitem .minfo{flex:1;min-width:0}
  .mitem .minfo b{display:block;font-size:.92em}
  .mitem .minfo small{color:var(--muted);font-size:.78em}
  .mitem audio,.mitem video.play{width:100%;margin-top:6px}
  .mitem .mact{display:flex;gap:6px;flex:0 0 auto}
  .mitem .mact button{background:var(--card2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:7px 9px;font-size:.8em;font-weight:700;cursor:pointer}
  .mitem .mact .del{color:var(--danger)}

  #ask{position:fixed;right:16px;bottom:calc(80px + env(safe-area-inset-bottom));z-index:46;background:var(--accent);color:var(--accent-ink);border:none;border-radius:999px;padding:13px 18px;font-weight:900;font-size:15px;box-shadow:0 8px 24px rgba(0,0,0,.28);cursor:pointer;display:flex;gap:8px;align-items:center}
  #mic{position:fixed;right:16px;bottom:calc(142px + env(safe-area-inset-bottom));z-index:46;background:var(--card);color:var(--accent);border:1px solid var(--line);border-radius:999px;width:54px;height:54px;font-size:22px;box-shadow:0 8px 24px rgba(0,0,0,.28);cursor:pointer}
  #mic.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);animation:micpulse 1.6s infinite}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(217,119,87,.5)}50%{box-shadow:0 0 0 12px rgba(217,119,87,0)}}
  .voicebar{position:fixed;left:12px;right:12px;top:calc(66px + env(safe-area-inset-top));z-index:47;max-width:820px;margin:0 auto;background:var(--card);border:1.5px solid var(--accent);border-radius:16px;padding:12px 14px;box-shadow:0 10px 30px rgba(0,0,0,.32);cursor:pointer}
  .voicebar.hidden{display:none}
  .voicebar .vrow{display:flex;align-items:center;gap:10px}
  .voicebar .vstate{flex:1;font-weight:800;font-size:1.02em}
  .voicebar .vgear,.voicebar .vstop{background:var(--card2);border:1px solid var(--line);color:var(--ink);border-radius:9px;width:34px;height:34px;font-size:15px;cursor:pointer;flex:0 0 auto}
  .voicebar .vheard{color:var(--muted);font-size:.9em;margin-top:6px;min-height:1.1em}
  .voicebar .vans{margin-top:6px;font-size:.95em;line-height:1.4;max-height:6.6em;overflow:auto}
  .voicebar.ask{border-color:var(--danger)} .voicebar.think{border-color:var(--crit)} .voicebar.speak{border-color:var(--tip)} .voicebar.wake{border-color:var(--accent)}

  .sheet{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center}
  .sheet .panel{background:var(--bg);border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:860px;max-height:92dvh;display:flex;flex-direction:column;animation:up .22s ease}
  @keyframes up{from{transform:translateY(30px);opacity:.5}to{transform:none;opacity:1}}
  .sheet .head{display:flex;align-items:center;gap:10px;padding:14px var(--pad);border-bottom:1px solid var(--line)}
  .sheet .head b{flex:1;font-size:1.05em}
  .sheet .head .cl{background:var(--card);border:1px solid var(--line);color:var(--ink);width:38px;height:38px;border-radius:11px;font-size:18px;cursor:pointer}
  .sheet .body{padding:14px var(--pad);overflow:auto;-webkit-overflow-scrolling:touch}

  /* tools & parts */
  .toolgrp{margin:16px 0}
  .toolgrp h3{font-size:1.05em;margin:.2em 0 .5em}
  .prod{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 13px;margin:8px 0;box-shadow:var(--shadow)}
  .prod .pi{flex:1;min-width:0}
  .prod .pi b{display:block}
  .prod .pi small{color:var(--muted);font-size:.82em}
  .prod a.buy{flex:0 0 auto;align-self:center;background:var(--accent);color:var(--accent-ink);text-decoration:none;font-weight:800;font-size:.82em;padding:9px 13px;border-radius:11px;white-space:nowrap}

  /* chat */
  #chatlog{display:flex;flex-direction:column;gap:12px}
  .msg{max-width:88%;padding:11px 14px;border-radius:15px;font-size:.97em;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
  .msg.u{align-self:flex-end;background:var(--accent);color:var(--accent-ink);border-bottom-right-radius:5px}
  .msg.a{align-self:flex-start;background:var(--card2);border:1px solid var(--line);border-bottom-left-radius:5px}
  .msg.a strong{color:var(--accent)}
  .msg img{max-width:160px;border-radius:10px;display:block;margin-bottom:8px}
  .msg.err{background:var(--danger-bg);border:1px solid var(--danger);color:var(--danger-ink)}
  .typing{align-self:flex-start;color:var(--muted);font-style:italic;padding:6px 4px}
  .chatinput{display:flex;gap:8px;padding:12px var(--pad) calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line);align-items:flex-end}
  .chatinput textarea{flex:1;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:14px;padding:11px 13px;font-size:16px;resize:none;max-height:120px;font-family:inherit}
  .chatinput .send{background:var(--accent);color:var(--accent-ink);border:none;border-radius:14px;width:52px;height:48px;font-size:20px;font-weight:900;cursor:pointer;flex:0 0 auto}
  .chatinput .send:disabled{opacity:.4}
  .attachchip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-size:.8em;color:var(--muted);margin:0 var(--pad) 8px}
  .attachchip img{width:26px;height:26px;border-radius:6px;object-fit:cover}
  .field{margin:12px 0}
  .field label{display:block;font-weight:700;margin-bottom:6px;font-size:.92em}
  .field input{width:100%;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:12px;font-size:16px}
  .field textarea{width:100%;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:12px;font-size:15px;font-family:inherit;resize:vertical;line-height:1.45}
  .gbtns{display:flex;gap:8px;justify-content:center;margin-top:14px}
  .pill2{background:var(--card2);border:1px solid var(--line);color:var(--ink);border-radius:999px;padding:9px 15px;font-weight:800;font-size:.84em;cursor:pointer}
  .pill2:active{transform:scale(.96)}
  details.fmtd{margin:10px 0;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 13px}
  details.fmtd summary{cursor:pointer;font-weight:700;font-size:.9em}
  pre.fmt{white-space:pre-wrap;font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);overflow:auto;max-height:40vh;margin:.6em 0 0}
  .grow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin:8px 0;cursor:pointer;box-shadow:var(--shadow)}
  .grow input{min-width:22px;height:22px;accent-color:var(--accent);flex:0 0 auto}
  .grow span{flex:1;min-width:0}.grow span b{display:block}.grow span small{color:var(--muted);font-size:.82em}
  .grow .del{background:none;border:none;color:var(--danger);font-size:1.15em;cursor:pointer;flex:0 0 auto}
  .grow .exp{background:none;border:none;color:var(--accent);font-size:1.1em;cursor:pointer;flex:0 0 auto}
  .btnrow{display:flex;gap:10px;margin-top:14px}
  .btn{flex:1;padding:13px;border-radius:13px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-weight:800;cursor:pointer;box-shadow:var(--shadow)}
  .btn.pri{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .btn.dgr{background:var(--danger-bg);border-color:var(--danger);color:var(--danger-ink)}
  .fine{color:var(--muted);font-size:.82em}

  /* recorder overlay */
  #rec{position:fixed;inset:0;z-index:90;background:#000;display:flex;flex-direction:column;color:#fff}
  #rec video{flex:1;width:100%;object-fit:cover;background:#000}
  #rec .audioface{flex:1;display:grid;place-content:center;text-align:center}
  #rec .audioface .mic{font-size:64px;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  #rec .timer{font-variant-numeric:tabular-nums;font-size:22px;font-weight:800;margin-top:12px}
  #rec .rc{display:flex;gap:16px;justify-content:center;align-items:center;padding:18px 0 calc(24px + env(safe-area-inset-bottom))}
  #rec .shutter{width:72px;height:72px;border-radius:50%;background:#fff;border:5px solid #bbb;cursor:pointer}
  #rec .shutter.recording{background:#e5534b;border-color:#fff;border-radius:16px}
  #rec .rx{position:absolute;top:calc(14px + env(safe-area-inset-top));left:14px;background:#000a;color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer}
  #rec .flip{background:#000a;color:#fff;border:1px solid #666;border-radius:999px;padding:12px 18px;font-weight:800;cursor:pointer}
  #rec .badge{position:absolute;top:calc(16px + env(safe-area-inset-top));right:16px;background:#e5534b;color:#fff;font-weight:800;padding:6px 12px;border-radius:999px;font-size:.85em}
</style>
</head>
<body>
<div id="top">
  <button class="ib" id="homeBtn" title="Home">☰</button>
  <div class="title" id="topTitle">2018 CR-V 1.5T · Session 1</div>
  <button class="ib" id="themeBtn" title="Theme">🖥️</button>
  <div class="pct" id="topPct">0%</div>
</div>
<div id="topbar"><i id="topbarFill"></i></div>

<main id="view"></main>
<button id="mic" title="Hands-free voice">🎙️</button>
<button id="ask">💬 Ask Claude</button>
<div id="voicebar" class="voicebar hidden">
  <div class="vrow"><span class="vstate"></span><button class="vgear" id="vGear" title="Voice settings">⚙︎</button><button class="vstop" id="vStop" title="Stop hands-free">✕</button></div>
  <div class="vheard"></div><div class="vans"></div>
</div>

<nav id="nav" class="hidden">
  <button id="prev">‹ Back</button>
  <button id="next" class="primary">Next ›</button>
</nav>

<script>
/* ================= THEME (system / light / dark) ================= */
const THEME_KEY="crv-theme";
function applyTheme(){
  const t=localStorage.getItem(THEME_KEY)||"system";
  if(t==="system") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme",t);
  const b=document.getElementById("themeBtn");
  if(b) b.textContent = t==="system"?"🖥️":(t==="dark"?"🌙":"☀️");
}
function cycleTheme(){
  const order=["system","light","dark"];
  const cur=localStorage.getItem(THEME_KEY)||"system";
  localStorage.setItem(THEME_KEY, order[(order.indexOf(cur)+1)%3]); applyTheme();
}
applyTheme();

function rebuild(){ STEPS=[]; ACTIVE.phases.forEach((ph,pi)=>{ if(!ph.id) ph.id="ph"+pi; if(!Array.isArray(ph.steps)) ph.steps=[]; ph.steps.forEach((st,si)=>{ st.phase=ph;st.pi=pi;st.si=si;st.id=ACTIVE.id+"::"+ph.id+"-"+si;st.gi=STEPS.length;STEPS.push(st);}); }); TOTAL_STEPS=STEPS.length; }
function setActive(id){ ACTIVE=guideById(id); state.activeGuide=ACTIVE.id; saveState(); rebuild(); }

/* Render a Claude-generated step body (typed blocks) into SAFE HTML — the model
   never emits raw HTML; every string is escaped, only **bold** is honored. */
function bodyToHtml(body){
  if(!Array.isArray(body)) return "";
  const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
  const rich=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  return body.map(b=>{
    if(!b||!b.type) return "";
    if(b.type==="steps") return `<ol class="steps">${(b.items||[]).map(i=>`<li>${rich(i)}</li>`).join("")}</ol>`;
    if(b.type==="check") return `<ul class="check" data-check>${(b.items||[]).map(i=>`<li><input type="checkbox"><label>${rich(i)}</label></li>`).join("")}</ul>`;
    if(b.type==="danger"||b.type==="crit"||b.type==="tip"){ const ic=b.type==="danger"?"🛑":b.type==="crit"?"⚠️":"💡"; return `<div class="call ${b.type}"><span class="ic">${ic}</span><div>${b.title?`<span class="t">${esc(b.title)}</span>`:""}${rich(b.text)}</div></div>`; }
    if(b.type==="spec") return `<div class="specbox">${rich(b.text)}${b.verify?` <span class="verify">${esc(b.verify)}</span>`:""}</div>`;
    return `<p>${rich(b.text)}</p>`;
  }).join("");
}

let db;
function openDB(){ return new Promise((res)=>{
  const r=indexedDB.open("crv-media",1);
  r.onupgradeneeded=e=>{ const d=e.target.result; if(!d.objectStoreNames.contains("media")){ const s=d.createObjectStore("media",{keyPath:"id",autoIncrement:true}); s.createIndex("stepId","stepId"); } };
  r.onsuccess=e=>{db=e.target.result;res(db)}; r.onerror=()=>res(null);
});}
function putMedia(rec){ return new Promise((res)=>{ const tx=db.transaction("media","readwrite"); tx.objectStore("media").add(rec); tx.oncomplete=()=>res(); tx.onerror=()=>res(); });}
function getMedia(stepId){ return new Promise((res)=>{ const out=[]; const tx=db.transaction("media","readonly"); const cur=tx.objectStore("media").openCursor(); cur.onsuccess=e=>{const c=e.target.result; if(c){ if(!stepId||c.value.stepId===stepId) out.push(c.value); c.continue(); } else res(out.sort((a,b)=>a.ts-b.ts)); }; });}
function delMedia(id){ return new Promise((res)=>{ const tx=db.transaction("media","readwrite"); tx.objectStore("media").delete(id); tx.oncomplete=()=>res(); });}

/* ================= CAPTURE (photo / audio / video) ================= */
function pickMime(kind){
  const opts = kind==='video'
    ? ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4']
    : ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg'];
  for(const m of opts){ if(window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m; }
  return '';
}
async function startCapture(stepId, kind){
  let stream;
  const constraints = kind==='photo'?{video:{facingMode:'environment'},audio:false}
    : kind==='audio'?{audio:true}
    : {video:{facingMode:'environment'},audio:true};
  try{ stream=await navigator.mediaDevices.getUserMedia(constraints); }
  catch(e){ alert((kind==='audio'?"Microphone":"Camera")+" unavailable: "+e.message+"\n\nNeeds HTTPS or localhost + permission."); return; }
  if((kind==='audio'||kind==='video') && !window.MediaRecorder){ alert("Recording isn't supported in this browser."); stream.getTracks().forEach(t=>t.stop()); return; }

  const ov=document.createElement("div"); ov.id="rec";
  ov.innerHTML=`<button class="rx">✕</button>${kind==='audio'?'<div class="badge hidden">● REC</div>':''}
    ${kind==='audio'?`<div class="audioface"><div class="mic">🎙️</div><div class="timer">0:00</div><div class="fine" style="color:#bbb;margin-top:8px">Tap the red button to start &amp; stop</div></div>`
      :`<video autoplay playsinline muted></video>${kind==='video'?'<div class="badge hidden">● REC</div>':''}`}
    <div class="rc">${kind==='video'?'<button class="flip">⟲ Flip</button>':''}<button class="shutter" aria-label="capture"></button></div>`;
  document.body.appendChild(ov);
  const video=ov.querySelector("video"), shutter=ov.querySelector(".shutter"), badge=ov.querySelector(".badge"), timerEl=ov.querySelector(".timer");
  let facing='environment';
  function stopStream(){ if(stream) stream.getTracks().forEach(t=>t.stop()); }
  function close(){ stopStream(); ov.remove(); }
  ov.querySelector(".rx").onclick=()=>{ if(rec&&rec.state==='recording'){ rec.stop(); } close(); };
  if(video){ video.srcObject=stream; }
  const flip=ov.querySelector(".flip");
  if(flip) flip.onclick=async()=>{ facing=facing==='environment'?'user':'environment'; stopStream(); try{ stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing},audio:kind==='video'}); video.srcObject=stream; }catch(e){} };

  if(kind==='photo'){
    shutter.onclick=async()=>{
      const w=video.videoWidth||1280,h=video.videoHeight||720,s=Math.min(1,1280/Math.max(w,h));
      const c=document.createElement("canvas"); c.width=w*s;c.height=h*s; c.getContext("2d").drawImage(video,0,0,c.width,c.height);
      await putMedia({type:'photo',stepId,ts:Date.now(),dataUrl:c.toDataURL("image/jpeg",0.82)}); close(); refreshStepMedia(stepId);
    };
    return;
  }
  // audio / video recording
  let rec, chunks=[], startT=0, tick;
  const mime=pickMime(kind);
  function fmt(ms){ const s=Math.floor(ms/1000); return Math.floor(s/60)+":"+String(s%60).padStart(2,'0'); }
  shutter.onclick=()=>{
    if(!rec || rec.state==='inactive'){
      try{ rec=new MediaRecorder(stream, mime?{mimeType:mime}:undefined); }catch(e){ alert("Recorder error: "+e.message); return; }
      chunks=[]; rec.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
      rec.onstop=async()=>{ const blob=new Blob(chunks,{type:mime||(kind==='video'?'video/webm':'audio/webm')});
        await putMedia({type:kind,stepId,ts:Date.now(),blob,mime:blob.type}); close(); refreshStepMedia(stepId); };
      rec.start(); startT=Date.now(); shutter.classList.add("recording"); if(badge) badge.classList.remove("hidden");
      tick=setInterval(()=>{ if(timerEl) timerEl.textContent=fmt(Date.now()-startT); },250);
    } else {
      clearInterval(tick); rec.stop(); shutter.classList.remove("recording");
    }
  };
}

const GUIDE_CONTEXT = `You are the in-app assistant for a DIY repair app covering a 2018 Honda CR-V 1.5L Turbo (L15B7), "Session 1" — three jobs done together because they share a coolant drain and front-end teardown:
1) A/C compressor + condenser replacement (refrigerant already professionally recovered; the car is driven to a shop afterward to evacuate & recharge, so this session ends with the A/C system OPEN and EMPTY).
2) Engine Coolant Temperature Sensor 2 (ECT2) replacement in the lower (plastic) radiator tank.
3) Bar's Leaks HG-1 head-gasket stop-leak, half a bottle, added to a COLD engine (system ~6.2 L / 6.5 qt).
Key confirmed facts and safety rules:
- The A/C refrigerant is R-1234yf (user confirmed). Do NOT recommend generic R-134a PAG46 oil; Honda R-1234yf systems use their own oil (ND-OIL 12 / POE per Honda service info) — tell the user to confirm the exact oil for their VIN and let the shop set the final oil charge.
- Never open A/C lines under pressure; confirm 0 psi. Cap every open line immediately. New, oiled O-ring at every A/C fitting (a missed O-ring is the #1 leak). Hand-rotate the new compressor 8-10 turns before it ever runs. DO NOT turn the A/C on after this session — the system is empty; running it dry destroys the compressor.
- ECT2 socket is unresolved between 17 mm and 19 mm — advise measuring the flats. It threads into a PLASTIC tank: new O-ring, hand-tight plus a small nudge, do not overtighten.
- Cooling system has NO bleed bolt — self-bleeds via a pressurized expansion/degas tank. Fill through the tank, cap loose, heater HIGH, idle until the radiator fan cycles twice, top off. Honda Type 2 (blue) 50/50. HG-1 goes in COLD, half bottle.
- A/C torque values are typical-Honda (line flanges ~9.8-12 N·m, compressor mounts ~24-25 N·m/18 lb-ft, condenser fittings ~9.8 N·m) — verify against the factory service manual for the VIN.
Be concise and practical for someone in a driveway with a phone. Lead with the answer, prioritize safety, and say when a spec must be verified against the factory manual. If they attach a photo, describe what you see and whether it looks correct (O-ring seated, fitting clean, connector fully seated) and flag anything risky. You are not a substitute for a professional.`;

  chatHistory.push({role:"assistant",content:[{type:"text",text:t}]}); return t;
}
function syncOpenChat(){ const log=document.getElementById("chatlog"); if(log){ renderChat(log); log.scrollTop=log.scrollHeight; } }
async function sendToClaude(text,ctx,log,typing,foot){
  if(!state.apiKey){ closeSheet(); openKey(); return; }
  pushUser(text, pendingImage); pendingImage=null; showAttach(foot);
  renderChat(log); log.scrollTop=log.scrollHeight; typing.classList.remove("hidden");
  try{ await completeClaude(ctx); typing.classList.add("hidden"); renderChat(log); log.scrollTop=log.scrollHeight; }
  catch(err){ typing.classList.add("hidden"); log.insertAdjacentHTML("beforeend", `<div class="msg err">⚠️ ${String(err.message||err)}<br><span class="fine">Check your API key (⚙️ on the home screen) and network.</span></div>`); log.scrollTop=log.scrollHeight; }
}

/* ================= NEW REPAIR (Claude-generated guides) ================= */
const BOILERPLATE = `Create a DIY repair guide for:
Vehicle: <year make model engine — e.g. 2015 Subaru Outback 2.5i>
Job(s): <what to repair — e.g. replace front brake pads and rotors>

Audience: someone in their driveway with common hand tools, reading on a phone.
Requirements:
- Break it into clear phases: prep & safety first, then the job, then reassembly and a final verification/checklist phase.
- One action per step. Put critical safety warnings inline as callouts.
- Give torque values and specs where they matter; if a value is model-specific or you're unsure, provide a typical value but tell me to verify it against the factory service manual for my VIN.
- Include a Tools list and a Parts list with good Amazon search terms.
- Note anything that really should be done by a shop.`;

const SCHEMA_SYSTEM = `You generate structured DIY vehicle repair guides for a phone app. Respond with a SINGLE JSON object and NOTHING else — no prose, no markdown, no code fences.

JSON shape:
{
  "title": "string — vehicle + job",
  "subtitle": "string — one short line",
  "safety": "string — the 1-2 most important safety rules (optional)",
  "phases": [
    { "name": "string — e.g. \\"Phase 1 · Lift & Wheels\\"",
      "color": "string — hex like \\"#4a86c5\\"",
      "steps": [
        { "t": "string — the step title (one action)",
          "allowMedia": true,
          "body": [
            {"type":"steps","items":["string","..."]},
            {"type":"check","items":["string","..."]},
            {"type":"danger","title":"string","text":"string"},
            {"type":"crit","title":"string","text":"string"},
            {"type":"tip","title":"string","text":"string"},
            {"type":"spec","text":"string","verify":"string"},
            {"type":"note","text":"string"}
          ] } ] } ],
  "tools": [ {"n":"name","d":"why it's needed","q":"amazon search terms"} ],
  "parts": [ {"g":"group name","items":[ {"n":"name","d":"note","q":"amazon search terms"} ]} ]
}

Block types: "steps" = numbered sub-steps; "check" = a checklist (these count toward progress — include at least one, e.g. a final "before you drive" list); "danger" = critical safety; "crit" = easy to get wrong; "tip" = helpful; "spec" = a torque/fluid value with a "verify" note; "note" = a plain paragraph.

Rules:
- Wrap emphasis in **double asterisks** for bold.
- Put safety-critical warnings as "danger" blocks, inline where they apply.
- Give real torque and fluid specs where they matter. If a number is model-specific or you are not certain, still give a typical value but add a "spec" block whose "verify" note tells the user to confirm it against the factory service manual for their VIN. Never present an invented number as certain.
- Keep each step to one action; keep text concise for a phone.
- 3-8 phases, safety/prep first and a verification phase last.
- Fill tools and parts with useful Amazon search terms.
- Output valid JSON only.`;

const SCHEMA_EXAMPLE = `{
  "title": "2015 Subaru Outback 2.5i — Front Brakes",
  "subtitle": "Front pads + rotors",
  "safety": "Chock the wheels and use jack stands — never rely on the jack alone.",
  "phases": [
    { "name": "Phase 1 · Lift & Wheels", "color": "#4a86c5",
      "steps": [
        { "t": "Loosen lugs, lift, remove wheel", "allowMedia": true,
          "body": [
            {"type":"steps","items":[
              "Crack the **lug nuts** 1/2 turn while on the ground.",
              "Lift and set the car on **jack stands**; chock the rears.",
              "Remove the wheel."
            ]},
            {"type":"danger","title":"Stands, not the jack","text":"A jack can drop. Use rated stands on level ground."}
          ] } ] },
    { "name": "Phase 4 · Verify", "color": "#3f8a49",
      "steps": [
        { "t": "Before you drive", "allowMedia": false,
          "body": [
            {"type":"check","items":[
              "Lugs torqued to spec",
              "**Pump the brake pedal** until firm before moving",
              "No leaks; wheels back on"
            ]},
            {"type":"spec","text":"Caliper bracket bolts ~80 ft-lb; lug nuts ~65 ft-lb.","verify":"Verify against the factory service manual for your VIN."}
          ] } ] }
  ],
  "tools": [ {"n":"Torque wrench (ft-lb)","d":"Caliper & lug torque","q":"1/2 inch drive torque wrench ft-lb"} ],
  "parts": [ {"g":"Brakes","items":[ {"n":"Front brake pads","d":"Match your trim","q":"2015 Subaru Outback front brake pads"} ]} ]
}`;

function extractJson(txt){ let s=(txt||"").trim(); const a=s.indexOf("{"), b=s.lastIndexOf("}"); if(a>=0&&b>a) s=s.slice(a,b+1); return JSON.parse(s); }
function validGuide(o){ return o&&typeof o.title==="string"&&Array.isArray(o.phases)&&o.phases.length&&o.phases.every(p=>p&&Array.isArray(p.steps)&&p.steps.length); }
function createGuide(o){
  const id="g"+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);
  const g={ id, builtin:false, title:o.title, subtitle:o.subtitle||"", safety:o.safety||"",
    phases:(o.phases||[]).map((p,i)=>({ id:"ph"+i, name:String(p.name||("Phase "+(i+1))),
      color:/^#[0-9a-fA-F]{3,8}$/.test(p.color)?p.color:"#8a8a80",
      steps:(p.steps||[]).map(s=>({ t:String(s.t||"Step"), allowMedia:s.allowMedia!==false, body:Array.isArray(s.body)?s.body:[] })) })),  // never trust s.html on import
    tools:Array.isArray(o.tools)?o.tools:[], parts:Array.isArray(o.parts)?o.parts:[] };
  const arr=userGuides(); arr.push(g); saveUserGuides(arr); return g;
}
function exportGuide(g){
  return { title:g.title, subtitle:g.subtitle||"", ...(g.safety?{safety:g.safety}:{}),
    phases:(g.phases||[]).map(p=>({ name:p.name, color:p.color, steps:(p.steps||[]).map(s=>({ t:s.t, allowMedia:s.allowMedia!==false, body:s.body||[] })) })),
    tools:g.tools||[], parts:g.parts||[] };
}

function openNew(){
  const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
  sheet("＋ New Repair Guide", `
    <p class="fine">Describe the vehicle and the job — Claude drafts a phased, safety-first guide in this app's format and you can start following it right away. Uses your Anthropic API key (same one as the helper).</p>
    <div class="field"><label>Getting-started prompt (edit freely)</label><textarea id="genPrompt" rows="11">${esc(BOILERPLATE)}</textarea></div>
    <details class="fmtd"><summary>Data format Claude fills in</summary><pre class="fmt">${esc(SCHEMA_EXAMPLE)}</pre></details>
    <div id="genStatus" class="fine" style="margin-top:8px"></div>
    <div class="btnrow"><button class="btn" id="gCancel">Cancel</button><button class="btn pri" id="gGo">✨ Generate</button></div>`,
  (b)=>{
    b.querySelector("#gCancel").onclick=closeSheet;
    const go=b.querySelector("#gGo"), status=b.querySelector("#genStatus");
    go.onclick=async()=>{
      if(!state.apiKey){ closeSheet(); openKey(); return; }
      const prompt=b.querySelector("#genPrompt").value.trim(); if(!prompt) return;
      go.disabled=true; status.textContent="✨ Generating with Claude… this can take 20–40s.";
      try{
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
          headers:{"content-type":"application/json","x-api-key":state.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-opus-4-8",max_tokens:8192,system:SCHEMA_SYSTEM,messages:[{role:"user",content:[{type:"text",text:prompt}]}]})});
        if(!res.ok) throw new Error("API "+res.status+": "+(await res.text()).slice(0,200));
        const data=await res.json();
        if(data.stop_reason==="refusal") throw new Error("Claude declined this request.");
        const txt=(data.content||[]).filter(x=>x.type==="text").map(x=>x.text).join("");
        let obj; try{ obj=extractJson(txt); }catch(e){ throw new Error("Couldn't parse the guide (it may have been cut off). Try a more focused request or run it again."); }
        if(!validGuide(obj)) throw new Error("The generated guide was missing phases or steps. Try again.");
        const g=createGuide(obj); setActive(g.id); closeSheet(); goHome();
      }catch(err){ go.disabled=false; status.innerHTML=`<span style="color:var(--danger)">⚠️ ${esc(String(err.message||err))}</span>`; }
    };
  });
}

function openGuides(){
  const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
  const rows=allGuides().map(g=>`<label class="grow"><input type="radio" name="gsel" value="${g.id}" ${g.id===ACTIVE.id?"checked":""}><span><b>${esc(g.title)}</b><small>${esc(g.subtitle||"")}${g.builtin?" · built-in":""}</small></span>${g.builtin?"":`<button class="exp" data-exp="${g.id}" title="Share / export">⧉</button><button class="del" data-del="${g.id}" title="Delete">🗑</button>`}</label>`).join("");
  sheet("Guides", rows+`<div class="btnrow"><button class="btn" id="addG">⬇ Add guide</button><button class="btn pri" id="newG">＋ New Repair</button></div>`,
  (b)=>{
    b.querySelectorAll('input[name=gsel]').forEach(r=>r.onchange=()=>{ setActive(r.value); closeSheet(); goHome(); });
    b.querySelectorAll("[data-del]").forEach(x=>x.onclick=(e)=>{ e.preventDefault(); const id=x.dataset.del; saveUserGuides(userGuides().filter(g=>g.id!==id)); if(ACTIVE.id===id) setActive("crv-s1"); closeSheet(); openGuides(); });
    b.querySelectorAll("[data-exp]").forEach(x=>x.onclick=(e)=>{ e.preventDefault(); openExport(guideById(x.dataset.exp)); });
    b.querySelector("#addG").onclick=openAdd;
    b.querySelector("#newG").onclick=openNew;
  });
}

function openExport(g){
  const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
  const json=JSON.stringify(exportGuide(g),null,2);
  sheet("Share: "+esc(g.title), `
    <p class="fine">Copy this JSON or download it — anyone can add it via <b>Guides → ⬇ Add guide</b> on their own device.</p>
    <div class="field"><textarea id="expJson" rows="12" readonly>${esc(json)}</textarea></div>
    <div id="expStatus" class="fine"></div>
    <div class="btnrow"><button class="btn" id="expCopy">⧉ Copy</button><button class="btn pri" id="expDl">⬇ Download .json</button></div>`,
  (b)=>{
    const ta=b.querySelector("#expJson"), st=b.querySelector("#expStatus");
    b.querySelector("#expCopy").onclick=async()=>{ try{ await navigator.clipboard.writeText(json); st.textContent="Copied to clipboard."; }catch(e){ ta.focus(); ta.select(); st.textContent="Couldn't auto-copy — the text is selected, copy it manually."; } };
    b.querySelector("#expDl").onclick=()=>{ const blob=new Blob([json],{type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=(g.title||"guide").replace(/[^\w.-]+/g,"_").slice(0,48)+".json"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),2000); st.textContent="Downloaded."; };
  });
}

function openAdd(){
  sheet("Add a guide", `
    <p class="fine">Paste a guide's JSON — exported from this app (Guides → ⧉) or written in the New Repair <a href="#" id="loadEx">data format</a> — to add it to your library.</p>
    <div class="field"><label>Guide JSON</label><textarea id="impJson" rows="12" placeholder='{ "title": "…", "phases": [ … ] }'></textarea></div>
    <div id="impStatus" class="fine"></div>
    <div class="btnrow"><button class="btn" id="iCancel">Cancel</button><button class="btn pri" id="iGo">Add guide</button></div>`,
  (b)=>{
    b.querySelector("#loadEx").onclick=(e)=>{ e.preventDefault(); b.querySelector("#impJson").value=SCHEMA_EXAMPLE; };
    b.querySelector("#iCancel").onclick=closeSheet;
    b.querySelector("#iGo").onclick=()=>{
      const st=b.querySelector("#impStatus"); let obj;
      try{ obj=extractJson(b.querySelector("#impJson").value); }catch(e){ st.innerHTML=`<span style="color:var(--danger)">⚠️ That isn't valid JSON.</span>`; return; }
      if(!validGuide(obj)){ st.innerHTML=`<span style="color:var(--danger)">⚠️ Needs a title and at least one phase with steps.</span>`; return; }
      const g=createGuide(obj); setActive(g.id); closeSheet(); goHome();
    };
  });
}

/* ================= HANDS-FREE VOICE (wake word + speak) ================= */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const Voice = {
  on:false, mode:"off", rec:null, wakeLock:null, restartT:null, askT:null, _vis:null,
  supported(){ return !!SR; },
  phrases(){ const w=(state.wakeWord||"hey claude").toLowerCase().trim();
    return [w,"hey claude","hey clod","hey cloud","hey claud","hey clyde","ok claude","okay claude"].filter((v,i,a)=>v&&a.indexOf(v)===i); },
  beep(freq){ try{ const A=window.AudioContext||window.webkitAudioContext; const a=new A(); const o=a.createOscillator(),g=a.createGain();
    o.frequency.value=freq||780; o.connect(g); g.connect(a.destination); const t=a.currentTime;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
    o.start(t); o.stop(t+0.17); o.onended=()=>{try{a.close()}catch(e){}}; }catch(e){} },
  async enable(){
    if(!this.supported()){ alert("Hands-free voice uses the browser's Speech Recognition API — it works in Chrome (Android & desktop) and Edge. iOS Safari doesn't support it yet, but you can still tap 💬 Ask Claude, and it will read answers aloud."); return; }
    if(!state.apiKey){ openKey(); return; }
    this.on=true; state.voiceOn=true; saveState();
    try{ if("wakeLock" in navigator) this.wakeLock=await navigator.wakeLock.request("screen"); }catch(e){}
    if(!this._vis){ this._vis=()=>{ if(this.on && document.visibilityState==="visible"){ this._relock(); if(this.mode==="wake"||this.mode==="ask") this.startRec(); } }; document.addEventListener("visibilitychange",this._vis); }
    this.render();
    this.say("Hands free on. Say, hey Claude, then ask your question.");
  },
  async _relock(){ try{ if("wakeLock" in navigator && !this.wakeLock) this.wakeLock=await navigator.wakeLock.request("screen"); }catch(e){} },
  disable(){ this.on=false; state.voiceOn=false; saveState(); clearTimeout(this.askT); this.stopRec(); try{ speechSynthesis.cancel(); }catch(e){}
    if(this.wakeLock){ try{this.wakeLock.release()}catch(e){} this.wakeLock=null; } this.setMode("off"); },
  toggle(){ this.on ? this.disable() : this.enable(); },
  setMode(m){ this.mode=m; this.render(); },
  startRec(){
    if(!this.on || !SR) return;
    if(this.mode!=="wake" && this.mode!=="ask") return;
    this.stopRec();
    const rec=new SR(); this.rec=rec; rec.lang="en-US"; rec.continuous=true; rec.interimResults=true;
    rec.onresult=(e)=>this.onResult(e);
    rec.onerror=()=>{};
    rec.onend=()=>{ if(this.rec===rec) this.rec=null; if(this.on && (this.mode==="wake"||this.mode==="ask")) this.restartT=setTimeout(()=>this.startRec(),300); };
    try{ rec.start(); }catch(e){ this.restartT=setTimeout(()=>{ try{rec.start()}catch(_){} },300); }
  },
  stopRec(){ clearTimeout(this.restartT); const r=this.rec; this.rec=null; if(r){ try{ r.onend=null; r.onresult=null; r.abort(); }catch(e){} } },
  onResult(e){
    let fin="",intr="";
    for(let i=e.resultIndex;i<e.results.length;i++){ const r=e.results[i]; if(r.isFinal) fin+=r[0].transcript; else intr+=r[0].transcript; }
    const live=((fin||intr)||"").trim(); if(live) this.heard(live);
    if(this.mode==="wake"){
      const low=live.toLowerCase(); const hit=this.phrases().find(w=>low.includes(w));
      if(hit){ const idx=low.indexOf(hit); const rem=live.slice(idx+hit.length).replace(/^[\s,.:;!?-]+/,"").trim(); this.beep(820);
        if(rem.length>=2) this.ask(rem); else this.armAsk(6000); }
    } else if(this.mode==="ask"){
      if(fin.trim().length>=2){ let q=fin.trim(); const low=q.toLowerCase(); const hit=this.phrases().find(w=>low.startsWith(w));
        if(hit) q=q.slice(hit.length).replace(/^[\s,.:;!?-]+/,"").trim(); if(q.length>=2) this.ask(q); }
    }
  },
  armAsk(ms){ this.setMode("ask"); this.startRec(); clearTimeout(this.askT);
    this.askT=setTimeout(()=>{ if(this.on && this.mode==="ask"){ this.setMode("wake"); this.startRec(); } }, ms||8000); },
  async ask(q){
    if(this.mode==="think") return; clearTimeout(this.askT); this.setMode("think"); this.stopRec(); this.heard(q); this.answer("");
    try{ pushUser(q,null); syncOpenChat(); const a=await completeClaude(this.ctx()); syncOpenChat(); this.say(a,true); }
    catch(err){ this.say("Sorry, I hit an error. "+(err&&err.message?err.message:""), true); }
  },
  ctx(){ return route==="step" ? ('Current step: "'+STEPS[cur].t+'" ('+STEPS[cur].phase.name+').') : ""; },
  plain(t){ return (t||"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/[#*_`>~]/g,"").replace(/\s+/g," ").trim().slice(0,1000); },
  say(text,followup){
    this.stopRec(); this.setMode("speak"); this.answer(text);
    const done=()=>{ if(!this.on) return; if(followup) this.armAsk(6000); else { this.setMode("wake"); this.startRec(); } };
    try{ speechSynthesis.cancel(); }catch(e){}
    if(!("speechSynthesis" in window) || state.voiceReplies===false){ setTimeout(done,300); return; }
    try{ const u=new SpeechSynthesisUtterance(this.plain(text)||"."); u.lang="en-US"; u.rate=1.02; u.onend=done; u.onerror=done; speechSynthesis.speak(u); }
    catch(e){ done(); }
  },
  skip(){ try{ speechSynthesis.cancel(); }catch(e){} if(this.mode==="speak"){ this.setMode("wake"); this.startRec(); } },
  heard(t){ const el=document.querySelector("#voicebar .vheard"); if(el) el.textContent=t?("“"+t+"”"):""; },
  answer(t){ const el=document.querySelector("#voicebar .vans"); if(el) el.textContent=this.plain(t).slice(0,260); },
  render(){
    const mic=document.getElementById("mic"); if(mic){ mic.classList.toggle("active",this.on); mic.textContent=this.on?"🛑":"🎙️"; }
    const bar=document.getElementById("voicebar"); if(!bar) return;
    if(!this.on){ bar.className="voicebar hidden"; return; }
    bar.className="voicebar "+this.mode;
    const L={wake:'🎙️ Say “Hey Claude”…', ask:"🔴 Listening — go ahead", think:"💭 Thinking…", speak:"🔊 Speaking (tap to skip)"};
    const s=bar.querySelector(".vstate"); if(s) s.textContent=L[this.mode]||"";
  }
};
function openVoiceSettings(){
  const w=(state.wakeWord||"hey claude");
  sheet("Hands-free voice", `
    <p class="fine">Say your wake word, then ask — Claude answers out loud. Built for busy, dirty hands. Answers use your API key; speech recognition needs Chrome/Edge (Android or desktop) and internet; the spoken replies work offline. Keep the app open; the screen is kept awake while it's on.</p>
    <div class="field"><label>Wake word / phrase</label><input id="vw" value="${String(w).replace(/"/g,'&quot;')}"></div>
    <label class="grow" style="cursor:pointer"><input type="checkbox" id="vtts" ${state.voiceReplies===false?"":"checked"}><span><b>Speak answers aloud</b><small>Text-to-speech replies</small></span></label>
    ${Voice.supported()?"":'<div class="call crit"><span class="ic">⚠️</span><div>This browser can\'t do speech recognition. Spoken answers still work; asking must be typed.</div></div>'}
    <div class="btnrow"><button class="btn" id="vc">Close</button><button class="btn pri" id="vstart">${Voice.on?"Stop":"Start"} hands-free</button></div>`,
  (b)=>{
    const commit=()=>{ state.wakeWord=(b.querySelector("#vw").value.trim()||"hey claude"); state.voiceReplies=b.querySelector("#vtts").checked; saveState(); };
    b.querySelector("#vc").onclick=()=>{ commit(); closeSheet(); };
    b.querySelector("#vstart").onclick=()=>{ commit(); closeSheet(); Voice.toggle(); };
  });
}
